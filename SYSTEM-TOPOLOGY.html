<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>虚拟医院 · 系统拓扑总控</title>
<style>
  :root {
    --bg: #0a0e14;
    --bg-panel: #111824;
    --grid: #16202e;
    --ink: #c9d4e0;
    --ink-dim: #6b7c91;
    --ink-faint: #3d4a5c;
    --teal: #3fb8af;          /* 医用青绿，主色 */
    --teal-glow: rgba(63,184,175,.35);
    --amber: #d99a4e;         /* 约束/边界 */
    --rust: #c2664d;          /* 危险/未实现 */
    --violet: #8b7fd4;        /* 溯源子系统 */
    --line: #2a3848;
    --ok: #4caf8f;
    --pending: #d99a4e;
    --unbuilt: #7a8699;
    --mono: "SF Mono", "JetBrains Mono", "Fira Code", ui-monospace, monospace;
    --sans: "Inter", -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    overflow: hidden;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 32px 32px;
    background-position: -1px -1px;
  }
  .wrap { display: flex; flex-direction: column; height: 100vh; }

  header {
    padding: 18px 28px 14px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: baseline; gap: 18px;
    background: linear-gradient(180deg, rgba(17,24,36,.9), rgba(10,14,20,.4));
    backdrop-filter: blur(4px);
    flex-wrap: wrap;
  }
  header .mark {
    font-family: var(--mono);
    font-size: 11px; letter-spacing: .32em;
    color: var(--teal); text-transform: uppercase;
    padding: 3px 0;
    border-top: 1px solid var(--teal);
    border-bottom: 1px solid var(--teal);
  }
  header h1 {
    font-size: 19px; font-weight: 600; letter-spacing: .02em;
  }
  header h1 .sub { color: var(--ink-dim); font-weight: 400; font-size: 14px; margin-left: 8px; }
  header .spacer { flex: 1; }
  .legend { display: flex; gap: 16px; font-size: 11px; color: var(--ink-dim); font-family: var(--mono); flex-wrap: wrap; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.ok { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
  .dot.pending { background: var(--pending); box-shadow: 0 0 6px var(--pending); }
  .dot.unbuilt { background: transparent; border: 1.5px solid var(--unbuilt); }

  .stage { flex: 1; position: relative; overflow: hidden; }
  svg { width: 100%; height: 100%; display: block; }

  .swimlane-label {
    font-family: var(--mono); font-size: 10px; letter-spacing: .2em;
    fill: var(--ink-faint); text-transform: uppercase;
  }
  .lane-rule { stroke: var(--line); stroke-width: 1; stroke-dasharray: 2 6; }

  .edge { stroke: var(--line); stroke-width: 1.5; fill: none; opacity: .55; transition: opacity .2s, stroke .2s; }
  .edge.flow { stroke: var(--teal); stroke-dasharray: 5 5; opacity: .5; }
  .edge.dep  { stroke: var(--ink-faint); }
  .edge.highlight { opacity: 1; stroke: var(--teal); stroke-width: 2.5; }
  .edge.dim { opacity: .08; }

  @keyframes dash { to { stroke-dashoffset: -100; } }
  .edge.flow.animate { animation: dash 3s linear infinite; }

  .node { cursor: pointer; }
  .node rect, .node .npill {
    fill: var(--bg-panel); stroke: var(--line); stroke-width: 1.5;
    transition: stroke .2s, filter .2s;
  }
  .node:hover rect, .node:hover .npill { stroke: var(--teal); filter: drop-shadow(0 0 8px var(--teal-glow)); }
  .node.selected rect, .node.selected .npill { stroke: var(--teal); stroke-width: 2.5; filter: drop-shadow(0 0 12px var(--teal-glow)); }
  .node.dim { opacity: .28; }
  .node .title { fill: var(--ink); font-size: 13px; font-weight: 600; }
  .node .meta { fill: var(--ink-dim); font-size: 10px; font-family: var(--mono); }
  .node .statusdot { }

  /* 约束/隔离围栏 */
  .boundary { fill: none; stroke-width: 1.5; rx: 14; }
  .boundary.A { stroke: var(--amber); stroke-dasharray: 7 5; }
  .boundary.B { stroke: var(--rust); stroke-dasharray: 7 5; }
  .boundary.iso { stroke: var(--violet); stroke-dasharray: 3 4; }
  .boundary-label {
    font-family: var(--mono); font-size: 10px; letter-spacing: .15em;
    text-transform: uppercase; font-weight: 600;
  }
  .boundary-label.A { fill: var(--amber); }
  .boundary-label.B { fill: var(--rust); }
  .boundary-label.iso { fill: var(--violet); }

  /* 详情面板 */
  .panel {
    position: absolute; top: 0; right: 0; height: 100%; width: 380px;
    background: linear-gradient(180deg, #121a27, #0d141d);
    border-left: 1px solid var(--teal);
    box-shadow: -20px 0 50px rgba(0,0,0,.5);
    transform: translateX(100%); transition: transform .32s cubic-bezier(.4,0,.2,1);
    padding: 26px 26px 30px; overflow-y: auto; z-index: 20;
  }
  .panel.open { transform: translateX(0); }
  .panel .close {
    position: absolute; top: 18px; right: 20px; cursor: pointer;
    color: var(--ink-dim); font-size: 22px; line-height: 1; background: none; border: none;
  }
  .panel .close:hover { color: var(--teal); }
  .panel .ptag {
    font-family: var(--mono); font-size: 10px; letter-spacing: .25em;
    text-transform: uppercase; color: var(--teal); margin-bottom: 10px;
  }
  .panel h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; letter-spacing: .01em; }
  .panel .pstatus { font-family: var(--mono); font-size: 12px; margin-bottom: 20px; display: inline-flex; align-items: center; gap: 7px; }
  .panel .pstatus.ok { color: var(--ok); }
  .panel .pstatus.pending { color: var(--pending); }
  .panel .pstatus.unbuilt { color: var(--unbuilt); }
  .panel .prow { margin-bottom: 17px; }
  .panel .plabel {
    font-family: var(--mono); font-size: 10px; letter-spacing: .15em;
    text-transform: uppercase; color: var(--ink-faint); margin-bottom: 6px;
  }
  .panel .pbody { font-size: 13.5px; line-height: 1.6; color: var(--ink); }
  .panel .pbody code {
    font-family: var(--mono); font-size: 12px; background: #0a1019;
    padding: 1px 6px; border-radius: 4px; color: var(--teal); border: 1px solid var(--line);
  }
  .panel .files { list-style: none; }
  .panel .files li {
    font-family: var(--mono); font-size: 11.5px; color: var(--ink-dim);
    padding: 4px 0 4px 16px; position: relative;
  }
  .panel .files li::before { content: "▸"; position: absolute; left: 0; color: var(--teal); }
  .panel .ctag {
    display: inline-block; font-family: var(--mono); font-size: 10px;
    padding: 2px 8px; border-radius: 4px; margin: 0 5px 5px 0; letter-spacing: .05em;
  }
  .panel .ctag.A { color: var(--amber); border: 1px solid var(--amber); }
  .panel .ctag.B { color: var(--rust); border: 1px solid var(--rust); }
  .panel .ctag.iso { color: var(--violet); border: 1px solid var(--violet); }

  .hint {
    position: absolute; bottom: 16px; left: 24px; font-family: var(--mono);
    font-size: 11px; color: var(--ink-faint); z-index: 10; pointer-events: none;
  }
  .toggles {
    position: absolute; bottom: 16px; right: 24px; z-index: 15;
    display: flex; gap: 8px;
  }
  .toggles button {
    font-family: var(--mono); font-size: 11px; color: var(--ink-dim);
    background: var(--bg-panel); border: 1px solid var(--line);
    padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all .2s;
  }
  .toggles button:hover { color: var(--teal); border-color: var(--teal); }
  .toggles button.active { color: var(--teal); border-color: var(--teal); background: rgba(63,184,175,.08); }

  @media (max-width: 720px) {
    .panel { width: 100%; }
    header h1 { font-size: 16px; }
    .legend { display: none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="mark">总控 · God View</span>
    <h1>虚拟医院 系统拓扑<span class="sub">私人家族健康评估 · 本地全栈 · 实况 2026-06-24（v2 双盲已落地）</span></h1>
    <div class="spacer"></div>
    <div class="legend">
      <span><i class="dot ok"></i>已跑通</span>
      <span><i class="dot pending"></i>待落地</span>
      <span><i class="dot unbuilt"></i>设计完成·未实现</span>
    </div>
  </header>

  <div class="stage">
    <svg id="topo" viewBox="0 0 1280 760" preserveAspectRatio="xMidYMid meet">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="var(--teal)"/>
        </marker>
        <marker id="arrowdim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="var(--ink-faint)"/>
        </marker>
      </defs>

      <!-- 泳道分隔 + 标签 -->
      <g id="lanes"></g>
      <!-- 约束/隔离围栏 -->
      <g id="boundaries"></g>
      <!-- 连线 -->
      <g id="edges"></g>
      <!-- 节点 -->
      <g id="nodes"></g>
    </svg>

    <div class="hint">点击任意节点查看详情 · 悬停高亮其连接</div>
    <div class="toggles">
      <button id="t-flow" class="active">数据流</button>
      <button id="t-dep" class="active">依赖</button>
      <button id="t-bound" class="active">约束边界</button>
    </div>

    <aside class="panel" id="panel">
      <button class="close" id="closePanel">&times;</button>
      <div class="ptag" id="p-tag">节点</div>
      <h2 id="p-title">—</h2>
      <div class="pstatus" id="p-status"></div>
      <div class="prow"><div class="plabel">职责</div><div class="pbody" id="p-role"></div></div>
      <div class="prow" id="p-files-row"><div class="plabel">文件 / 实现</div><ul class="files" id="p-files"></ul></div>
      <div class="prow" id="p-cons-row"><div class="plabel">约束作用</div><div id="p-cons"></div></div>
      <div class="prow" id="p-note-row"><div class="plabel">备注</div><div class="pbody" id="p-note"></div></div>
    </aside>
  </div>
</div>

  { id:"v2", lane:"sub", x:230, y:680, w:195, h:50, title:"v2 双盲交叉验证", meta:"已落地", status:"ok",
    role:"A1问诊→结构化→[A2 国内·llama3.3 ⟂ B 国际·llama4]→并排呈现。模型轴+证据轴+语境轴 三重异质性=真双盲。已端到端实测。",
    files:["run_dual / interviewer / domestic_kb","前端并排报告 + 流式"], cons:["Bcn"], note:"两轨各照病例一面（BPH例：B精准定病、A托起代谢共病）。判断权归人，系统不仲裁。" },

// 连线：type=flow(数据流) | dep(依赖)
const EDGES = [
  // 评估数据流（run_dual 双盲）
  { from:"frontend", to:"orchestrator", type:"flow" },
  { from:"orchestrator", to:"rundual", type:"flow" },
  { from:"orchestrator", to:"interviewer", type:"flow" },
  { from:"orchestrator", to:"ocr", type:"flow" },
  { from:"rundual", to:"rules", type:"flow" },
  { from:"rundual", to:"llama33", type:"flow" },   // 结构化 + A2 推理
  { from:"rundual", to:"llama4", type:"flow" },     // B 推理
  { from:"rundual", to:"gemma", type:"flow" },      // B 翻译
  { from:"rundual", to:"nomic", type:"flow" },      // B 检索
  { from:"rundual", to:"bgem3", type:"flow" },      // A 检索
  { from:"interviewer", to:"llama33", type:"flow" },
  { from:"ocr", to:"glmocr", type:"flow" },
  { from:"ocr", to:"minio", type:"flow" },
  // 检索/落库到存储
  { from:"nomic", to:"kb", type:"flow" },
  { from:"bgem3", to:"domkb", type:"flow" },
  { from:"rules", to:"kb", type:"flow" },
  { from:"rundual", to:"member", type:"flow" },
  { from:"interviewer", to:"member", type:"flow" },
  // 认证依赖
  { from:"frontend", to:"authentik", type:"dep" },
  { from:"orchestrator", to:"auth", type:"dep" },
  { from:"auth", to:"authentik", type:"dep" },
  { from:"auth", to:"member", type:"dep" },
  { from:"tailscale", to:"frontend", type:"dep" },
  // 子系统聚合依赖
  { from:"v2", to:"rundual", type:"dep" },
  { from:"v2", to:"llama33", type:"dep" },
  { from:"v2", to:"llama4", type:"dep" },
  { from:"v2", to:"domkb", type:"dep" },
  { from:"backup", to:"member", type:"dep" },
  { from:"backup", to:"minio", type:"dep" },
  { from:"github", to:"frontend", type:"dep" },
];

// 约束/隔离围栏：包住若干节点
const BOUNDARIES = [
  { cls:"A", label:"约束 A · 评估模型仅非大陆机构", nodes:["llama33","llama4","gemma","nomic"], pad:20 },
  { cls:"B", label:"约束 B · B轨国际指南锁死(CHECK)", nodes:["kb"], pad:14, side:"B" },
  { cls:"iso", label:"约束B分流程 · A轨国内 / 向量空间隔离", nodes:["domkb"], pad:14, side:"iso" },
];

const CONS_TEXT = {
  A:  { cls:"A",  text:"约束 A：评估全链路模型仅非中国大陆机构（llama3.3/llama4=Meta、gemma4=Google、nomic=美）。禁 Qwen/DeepSeek/GLM/BGE。" },
  Aex:{ cls:"iso",text:"约束 A 例外（用户裁定）：bge-m3(智源) 仅限流程A国内指南检索；glm-ocr(智谱) 仅限非评估OCR。二者严禁接入翻译/B轨/任何评估推理。" },
  B:  { cls:"B",  text:"约束 B（B轨）：knowledge_base 仅国际权威机构（WHO/ADA/AHA/NICE/EAU/MDS），org CHECK + ingest 黑名单双重防线。" },
  Bcn:{ cls:"iso",text:"约束 B 分流程（A轨）：流程A允许国内指南，存 domestic_kb（无 PRC CHECK），制造证据层异质性。会员上传的大陆医院报告属个人医疗事实，亦不受限。" },
  iso:{ cls:"iso",text:"隔离：domestic_kb(bge-m3 1024) ⊥ knowledge_base(nomic 768)，物理+向量空间隔离，检索永不跨库。文档溯源库(未落地)同此思想⊥医疗库。" },
};

// ============ 渲染 ============
const NS = "http://www.w3.org/2000/svg";
const nodeById = Object.fromEntries(NODES.map(n=>[n.id,n]));
const lanesG = document.getElementById("lanes");
const boundG = document.getElementById("boundaries");
const edgesG = document.getElementById("edges");
const nodesG = document.getElementById("nodes");

function el(tag, attrs={}) {
  const e = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

// 泳道
LANES.forEach(l=>{
  const t = el("text",{x:24,y:l.y-46,class:"swimlane-label"});
  t.textContent = l.label;
  lanesG.appendChild(t);
});

// 边界围栏
function drawBoundaries() {
  boundG.innerHTML = "";
  if (!show.bound) return;
  BOUNDARIES.forEach(b=>{
    const ns = b.nodes.map(id=>nodeById[id]);
    let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
    ns.forEach(n=>{
      minX=Math.min(minX,n.x-n.w/2); maxX=Math.max(maxX,n.x+n.w/2);
      minY=Math.min(minY,n.y-n.h/2); maxY=Math.max(maxY,n.y+n.h/2);
    });
    const p=b.pad;
    const r = el("rect",{x:minX-p,y:minY-p,width:maxX-minX+2*p,height:maxY-minY+2*p,
      rx:14,class:`boundary ${b.cls}`});
    boundG.appendChild(r);
    const lbl = el("text",{x:minX-p+4,y:minY-p-7,class:`boundary-label ${b.cls}`});
    lbl.textContent=b.label;
    boundG.appendChild(lbl);
  });
}

// 连线路径（贝塞尔）
function edgePath(a,b){
  const x1=a.x, y1=a.y, x2=b.x, y2=b.y;
  const my=(y1+y2)/2;
  return `M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`;
}
const edgeEls=[];
function drawEdges(){
  edgesG.innerHTML=""; edgeEls.length=0;
  EDGES.forEach(e=>{
    if(e.type==="flow" && !show.flow) return;
    if(e.type==="dep" && !show.dep) return;
    const a=nodeById[e.from], b=nodeById[e.to];
    const cls = e.type==="flow" ? "edge flow animate" : "edge dep";
    const p = el("path",{d:edgePath(a,b),class:cls,
      "marker-end": e.type==="flow"?"url(#arrow)":"url(#arrowdim)"});
    p.dataset.from=e.from; p.dataset.to=e.to;
    edgesG.appendChild(p); edgeEls.push(p);
  });
}

// 节点
const STATUS_LABEL={ok:"已跑通 · working well",pending:"待落地 · 代码完成",unbuilt:"设计完成 · 未实现"};
function drawNodes(){
  nodesG.innerHTML="";
  NODES.forEach(n=>{
    const g=el("g",{class:"node",transform:`translate(${n.x-n.w/2},${n.y-n.h/2})`});
    g.dataset.id=n.id;
    const rect=el("rect",{width:n.w,height:n.h,rx:9});
    g.appendChild(rect);
    // 状态点
    const sd=el("circle",{cx:14,cy:n.h/2,r:4,class:"statusdot"});
    if(n.status==="ok"){sd.setAttribute("fill","var(--ok)");sd.setAttribute("filter","drop-shadow(0 0 4px var(--ok))");}
    else if(n.status==="pending"){sd.setAttribute("fill","var(--pending)");sd.setAttribute("filter","drop-shadow(0 0 4px var(--pending))");}
    else{sd.setAttribute("fill","transparent");sd.setAttribute("stroke","var(--unbuilt)");sd.setAttribute("stroke-width","1.5");}
    g.appendChild(sd);
    const t1=el("text",{x:28,y:n.h/2-3,class:"title"}); t1.textContent=n.title; g.appendChild(t1);
    const t2=el("text",{x:28,y:n.h/2+13,class:"meta"}); t2.textContent=n.meta; g.appendChild(t2);
    // 约束角标
    if(n.cons){
      n.cons.forEach((c,i)=>{
        const cx=n.w-14-i*16;
        const badge=el("text",{x:cx,y:15,class:`boundary-label ${c}`,"text-anchor":"middle"});
        badge.textContent=c==="iso"?"⊥":c;
        g.appendChild(badge);
      });
    }
    g.addEventListener("click",()=>selectNode(n.id));
    g.addEventListener("mouseenter",()=>hoverNode(n.id,true));
    g.addEventListener("mouseleave",()=>hoverNode(n.id,false));
    nodesG.appendChild(g);
  });
}

// ============ 交互 ============
const show={flow:true,dep:true,bound:true};
let selected=null;

function hoverNode(id,on){
  if(selected) return; // 选中态优先
  const connected=new Set([id]);
  EDGES.forEach(e=>{ if(e.from===id)connected.add(e.to); if(e.to===id)connected.add(e.from); });
  document.querySelectorAll(".node").forEach(g=>{
    g.classList.toggle("dim", on && !connected.has(g.dataset.id));
  });
  edgeEls.forEach(p=>{
    const rel = p.dataset.from===id||p.dataset.to===id;
    p.classList.toggle("highlight", on&&rel);
    p.classList.toggle("dim", on&&!rel);
  });
}

function selectNode(id){
  selected=id;
  const n=nodeById[id];
  document.querySelectorAll(".node").forEach(g=>g.classList.toggle("selected",g.dataset.id===id));
  // 高亮相关连线
  const connected=new Set([id]);
  EDGES.forEach(e=>{ if(e.from===id)connected.add(e.to); if(e.to===id)connected.add(e.from); });
  document.querySelectorAll(".node").forEach(g=>g.classList.toggle("dim",!connected.has(g.dataset.id)));
  edgeEls.forEach(p=>{
    const rel=p.dataset.from===id||p.dataset.to===id;
    p.classList.toggle("highlight",rel); p.classList.toggle("dim",!rel);
  });
  // 填面板
  document.getElementById("p-tag").textContent = LANES.find(l=>l.id===n.lane).label.split(" ")[0];
  document.getElementById("p-title").textContent=n.title;
  const ps=document.getElementById("p-status");
  ps.className="pstatus "+n.status;
  ps.innerHTML=`<span class="dot ${n.status}"></span>${STATUS_LABEL[n.status]}`;
  document.getElementById("p-role").textContent=n.role;
  // 文件
  const fr=document.getElementById("p-files-row"), fl=document.getElementById("p-files");
  if(n.files&&n.files.length){fr.style.display="";fl.innerHTML=n.files.map(f=>`<li>${f}</li>`).join("");}
  else fr.style.display="none";
  // 约束
  const cr=document.getElementById("p-cons-row"), cc=document.getElementById("p-cons");
  if(n.cons&&n.cons.length){cr.style.display="";cc.innerHTML=n.cons.map(c=>{
    const info=CONS_TEXT[c];
    return `<div style="margin-bottom:8px"><span class="ctag ${info.cls}">${c==="iso"?"隔离":"约束 "+c}</span><div class="pbody" style="margin-top:5px;font-size:12.5px">${info.text}</div></div>`;
  }).join("");}
  else cr.style.display="none";
  // 备注
  const nr=document.getElementById("p-note-row");
  if(n.note){nr.style.display="";document.getElementById("p-note").textContent=n.note;}
  else nr.style.display="none";
  document.getElementById("panel").classList.add("open");
}

function deselect(){
  selected=null;
  document.getElementById("panel").classList.remove("open");
  document.querySelectorAll(".node").forEach(g=>{g.classList.remove("selected","dim");});
  edgeEls.forEach(p=>p.classList.remove("highlight","dim"));
}
document.getElementById("closePanel").addEventListener("click",deselect);
document.getElementById("topo").addEventListener("click",e=>{
  if(e.target.id==="topo") deselect();
});

// 开关
function bindToggle(btnId,key,redraw){
  document.getElementById(btnId).addEventListener("click",function(){
    show[key]=!show[key]; this.classList.toggle("active",show[key]); redraw();
  });
}
bindToggle("t-flow","flow",drawEdges);
bindToggle("t-dep","dep",drawEdges);
bindToggle("t-bound","bound",drawBoundaries);

// 初始渲染
drawBoundaries(); drawEdges(); drawNodes();
</script>
</body>
</html>
