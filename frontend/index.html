<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家族健康档案</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/oidc-client-ts@3/dist/browser/oidc-client-ts.min.js"></script>
<style>
  /* 深色主题（IDE 质感：深炭青底、克制强调色）。变量驱动，全站级联。
     原浅色医用青绿值保留在 .theme-light 下，便于日后切回/做切换开关。 */
  :root {
    --ink: #d7e3df;
    --teal-900: #c3ddd7;
    --teal-700: #5fb6ab;
    --teal-500: #34a99d;
    --teal-100: #233330;
    --teal-50: #151e1c;
    --ochre: #e0916f;
    --ochre-bg: #38231a;
    --amber-700: #d6b057;
    --amber-bg: #322915;
    --paper: #0e1413;
    --card: #1a2422;
    --line: #2a3631;
    --muted: #8ba29c;     /* 次要文字 */
    --muted2: #93a59f;    /* 更淡的次要文字 */
    --faint: #7d8f8a;     /* 审计 pre 等弱文字 */
    --disc-bg: #29230f;   /* 声明框背景 */
    --disc-line: #463c1f; /* 声明框边框 */
    --disc-text: #cdb878; /* 声明框文字 */
  }
  .theme-light {
    --ink: #1a2b2b; --teal-900: #0f3d3a; --teal-700: #16615b; --teal-500: #2a8f86;
    --teal-100: #d8ece9; --teal-50: #eef6f4; --ochre: #9a4a2f; --ochre-bg: #f5e6df;
    --amber-700: #8a5a14; --amber-bg: #f6ecd8; --paper: #f8f9f7; --card: #ffffff; --line: #e2e8e5;
    --muted: #7a8a86; --muted2: #9aa8a4; --faint: #5a6a66;
    --disc-bg: #fbf6ec; --disc-line: #e9dcc3; --disc-text: #8a7a55;
  }
  body { background: var(--paper); color: var(--ink); font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
  .serif { font-family: "Georgia", "Songti SC", serif; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--teal-700); }
  /* ── 微交互（全站友好化）── */
  button:not(:disabled) { transition: background .15s, transform .12s, border-color .15s, box-shadow .15s, opacity .15s; cursor: pointer; }
  button:not(:disabled):active { transform: translateY(1px); }
  .vh-lift { transition: transform .15s, border-color .15s, box-shadow .15s; }
  .vh-lift:hover:not(:disabled) { transform: translateY(-2px); border-color: var(--teal-500) !important; box-shadow: 0 6px 20px rgba(0,0,0,.28); }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--teal-500) !important; box-shadow: 0 0 0 3px rgba(52,169,157,.18); }
  @keyframes vh-blink { 0%,80%,100%{opacity:.25} 40%{opacity:1} }
  .vh-dot { display:inline-block; width:.42em; height:.42em; border-radius:50%; background:var(--muted); margin:0 .09em; animation:vh-blink 1.2s infinite; }
  .vh-dot:nth-child(2){animation-delay:.2s} .vh-dot:nth-child(3){animation-delay:.4s}
  @keyframes vh-fade-in { from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:none} }
  .vh-fade { animation: vh-fade-in .25s ease-out; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// ── API 基址。生产环境指向编排服务，开发时用 mock。 ──
const API_BASE = "http://127.0.0.1:8000";
const USE_MOCK = false;

// ── OIDC 配置（授权码 + PKCE，oidc-client-ts 管理令牌生命周期） ──
// 浏览器侧 authority = localhost:9100（匹配 Authentik 签发 token 的 iss claim）
// orchestrator 侧 JWKS_URL = authentik-server:9000（容器内网，见 auth.py）
const _UM = USE_MOCK ? null : new oidc.UserManager({
  authority:     "http://localhost:9100/application/o/virtual-hospital/",
  client_id:     "FqESExIdzWZZgkwh55IHiABpaSmasxfjAq1ztBVB",
  redirect_uri:  "http://localhost:5500/",
  response_type: "code",
  scope:         "openid profile",
  automaticSilentRenew: true,
});

async function login() {
  await _UM.signinRedirect();
}

async function authHeaders() {
  if (USE_MOCK) return { "Authorization": "Bearer mock-token" };
  const u = await _UM.getUser();
  if (u && !u.expired) {
    return { "Authorization": `Bearer ${u.access_token}` };
  }
  try {
    const renewed = await _UM.signinSilent();
    if (renewed && !renewed.expired) {
      return { "Authorization": `Bearer ${renewed.access_token}` };
    }
  } catch (e) {
    console.warn("静默续期失败", e);
  }
  return {};
}

// ── Mock 数据，便于无后端时预览全流程 ──
const MOCK_MEMBERS = [
  { id: "m1", full_name: "张明远", relation: "本人", birth_date: "1968-03-12" },
  { id: "m2", full_name: "李慧", relation: "配偶", birth_date: "1971-09-05" },
  { id: "m3", full_name: "张晓宇", relation: "子女", birth_date: "2001-06-20" },
];
const MOCK_RECORDS = {
  m1: [
    { id: "r1", record_type: "lab_report", source_org: "某三甲医院", record_date: "2025-05-10", extracted_zh: "空腹血糖 7.4 mmol/L，糖化血红蛋白 6.8%，收缩压 145 mmHg" },
    { id: "r2", record_type: "checkup", source_org: "体检中心", record_date: "2024-11-02", extracted_zh: "常规体检，LDL 3.2 mmol/L" },
  ],
  m2: [
    { id: "r3", record_type: "lab_report", source_org: "某医院", record_date: "2025-04-18", extracted_zh: "甲状腺功能正常，空腹血糖 5.2 mmol/L" },
  ],
  m3: [],
};

async function apiAssess(memberId, recordId, zhData) {
  if (USE_MOCK) {
    await new Promise(r => setTimeout(r, 1400));
    return {
      report_zh: "根据所提供的检验数据，空腹血糖（fasting plasma glucose）为 7.4 mmol/L，已达到或超过糖尿病诊断阈值 7.0 mmol/L [WHO 2019 DM]。糖化血红蛋白（HbA1c）6.8% 同样超过 6.5% 的诊断阈值 [ADA 2024]。收缩压（systolic blood pressure）145 mmHg 处于一级高血压范围 [NICE NG136]。\n\n建议：上述为基于国际指南阈值的客观判断，非临床诊断。建议携带完整检验报告咨询专业医师，进行确诊与后续管理。",
      risk_sources: ["WHO 2019 DM", "ADA 2024", "NICE NG136"],
      report_a_zh: "1. 临床印象：2 型糖尿病、1 级高血压。\n2. 指南符合情况：依据《中国2型糖尿病防治指南（2020）》，空腹血糖 7.4 mmol/L 已达糖尿病诊断标准（≥7.0）；糖化血红蛋白 6.8% 亦超过 6.5%。依据《中国高血压防治指南（2024）》，收缩压 145 mmHg 达 1 级高血压（≥140）。\n3. 建议措施：完善口服葡萄糖耐量试验确诊，启动生活方式干预，必要时降糖降压治疗，并定期随访。",
      sources_a: ["中国2型糖尿病防治指南2020", "中国高血压防治指南2024"],
      a_model: "llama3.3:70b", b_model: "llama4:16x17b",
      findings_en: "FINDINGS: Fasting plasma glucose 7.4 mmol/L; HbA1c 6.8%; systolic BP 145 mmHg.\nASSESSMENT: FPG and HbA1c both at/above diabetes diagnostic thresholds [WHO 2019 DM][ADA 2024]. SBP in stage 1 hypertension range [NICE NG136].\nRISK LEVEL: high\nLIMITATIONS: Single measurement; not a clinical diagnosis.",
      rule_hits: [
        { metric: "fasting_glucose_mmol_l", value: 7.4, conclusion: "空腹血糖达到或超过糖尿病诊断阈值（7.0 mmol/L）", citation_id: "WHO 2019 DM", severity: "high" },
        { metric: "hba1c_percent", value: 6.8, conclusion: "HbA1c 达到或超过糖尿病诊断阈值（6.5%）", citation_id: "ADA 2024", severity: "high" },
        { metric: "systolic_bp_mmhg", value: 145, conclusion: "收缩压达到或超过 140 mmHg（一级高血压或以上）", citation_id: "NICE NG136", severity: "moderate" },
      ],
      metrics: { fasting_glucose_mmol_l: 7.4, hba1c_percent: 6.8, systolic_bp_mmhg: 145, ldl_mmol_l: 3.2 },
    };
  }
  const resp = await fetch(`${API_BASE}/assess`, {
    method: "POST",
    headers: { "Content-Type": "application/json", ...(await authHeaders()) },
    body: JSON.stringify({ member_id: memberId, record_id: recordId, zh_data: zhData }),
  });
  if (resp.status === 401) { await _UM.signinRedirect(); throw new Error("会话已过期，正在重新登录"); }
  if (resp.status === 403) throw new Error("无权对该成员运行评估");
  if (!resp.ok) throw new Error(`评估失败：${resp.status}`);
  return resp.json();
}

// ── 科室配置（严格四科） ──
const DEPARTMENTS = [
  { key: "cardiology",    label: "心血管内科", icon: "❤️",  desc: "高血压 · 冠心病 · 心律失常" },
  { key: "endocrinology", label: "内分泌科",   icon: "🧪",  desc: "糖尿病 · 甲状腺 · 代谢综合征" },
  { key: "urology",       label: "泌尿外科",   icon: "🫘",  desc: "前列腺 · 肾结石 · 尿路感染" },
  { key: "neurology",     label: "神经内科",   icon: "🧠",  desc: "头痛 · 眩晕 · 周围神经病变" },
];

// 需求3：点科室后嵌入对话的首条过渡说明
const INTRO_TEXT =
  "本系统为保护您的隐私，全部推理均在本地模型完成，数据不出本机。" +
  "因此单次问诊与评估可能需要数十秒甚至更久，请耐心等待——较长的处理时间属正常运行状态，不代表评估质量。\n\n" +
  "本项目对标三甲全科的循证参考能力：国际权威指南检索 + 医学推理双轨评估，每条结论均标注证据来源，仅供参考、不替代专业医疗。\n\n" +
  "正在为您接入主治医生，即将进入诊室…";

const RECORD_TYPE_LABEL = {
  prescription: "处方", lab_report: "检验报告", imaging: "影像", checkup: "体检报告",
  symptom_package: "问诊症状包",
};
const UPLOAD_TYPES = [
  { key: "lab_report", label: "检验报告" }, { key: "imaging", label: "影像报告" },
  { key: "checkup", label: "体检报告" }, { key: "prescription", label: "处方" },
];
const SEVERITY = {
  high: { label: "高", fg: "var(--ochre)", bg: "var(--ochre-bg)" },
  moderate: { label: "中", fg: "var(--amber-700)", bg: "var(--amber-bg)" },
  low: { label: "低", fg: "var(--teal-700)", bg: "var(--teal-100)" },
};

function age(birth) {
  if (!birth) return "—";
  return Math.floor((Date.now() - new Date(birth)) / 3.15576e10) + " 岁";
}

// ── 左侧成员栏 ──
function MemberSidebar({ members, activeId, onSelect, assessProg }) {
  return (
    <aside className="w-64 shrink-0 border-r min-h-screen p-5" style={{ borderColor: "var(--line)", background: "var(--card)" }}>
      <div className="mb-6">
        <h1 className="serif text-xl" style={{ color: "var(--teal-900)" }}>家族健康档案</h1>
        <p className="text-xs mt-1" style={{ color: "var(--teal-700)" }}>本地私有 · 数据不出家门</p>
      </div>
      <nav className="space-y-1">
        {members.map(m => {
          const active = m.id === activeId;
          return (
            <button key={m.id} onClick={() => onSelect(m.id)}
              className="w-full text-left px-3 py-2.5 rounded-lg transition-colors"
              style={{ background: active ? "var(--teal-100)" : "transparent" }}>
              <div className="flex items-center justify-between">
                <span className="font-medium text-sm" style={{ color: active ? "var(--teal-900)" : "var(--ink)" }}>{m.full_name}</span>
                <span className="text-xs px-1.5 py-0.5 rounded" style={{ background: "var(--teal-50)", color: "var(--teal-700)" }}>{m.relation}</span>
              </div>
              <div className="text-xs mt-0.5" style={{ color: "var(--muted)" }}>{age(m.birth_date)}</div>
            </button>
          );
        })}
      </nav>
      <SidebarProgress prog={assessProg} />
    </aside>
  );
}

// ── 健康记录卡片 ──
function RecordCard({ rec, onAssess, assessing, onEdit }) {
  const isSymptomPackage = rec.record_type === 'symptom_package';
  return (
    <div className="vh-lift rounded-xl border p-4" style={{ borderColor: "var(--line)", background: "var(--card)" }}>
      <div className="flex items-start justify-between">
        <div>
          <span className="text-xs px-2 py-0.5 rounded" style={{ background: "var(--teal-50)", color: "var(--teal-700)" }}>
            {RECORD_TYPE_LABEL[rec.record_type] || rec.record_type}
          </span>
          <span className="text-xs ml-2" style={{ color: "var(--muted)" }}>{rec.record_date} · {rec.source_org}</span>
        </div>
        <div className="flex gap-2">
          <button onClick={() => onAssess(rec)} disabled={assessing}
            className="text-xs px-3 py-1.5 rounded-lg font-medium transition-opacity disabled:opacity-50"
            style={{ background: "var(--teal-500)", color: "#fff" }}>
            {assessing ? "评估中…" : "运行评估"}
          </button>
          {isSymptomPackage && (
            <button onClick={() => onEdit(rec)} disabled={assessing}
              className="text-xs px-3 py-1.5 rounded-lg font-medium transition-opacity disabled:opacity-50"
              style={{ background: "var(--teal-100)", color: "var(--teal-900)" }}>
              编辑
            </button>
          )}
        </div>
      </div>
      <p className="text-sm mt-3 leading-relaxed" style={{ color: "var(--ink)" }}>{rec.extracted_zh}</p>
    </div>
  );
}

// 轻量清洗 LLM 文本里漏出的 LaTeX 数学符号（不引整套 KaTeX）
function cleanInlineMath(text) {
  if (!text) return text;
  return text
    .replace(/\$\s*5\s*\\?alpha\s*\$/g, "5α")
    .replace(/\$\s*\\?alpha\s*\$/g, "α")
    .replace(/\$\s*\\?beta\s*\$/g, "β")
    .replace(/\\?alpha/g, "α")
    .replace(/\\?beta/g, "β")
    .replace(/\$/g, "");
}

// 声明条款（ARCHITECTURE §7，报告必须醒目展示）
const DISCLAIMER_1 = "本系统基于人工智能模型对健康数据进行循证参考分析，其输出内容不构成医学诊断、医疗建议或处方意见。任何健康相关决策均应以具有执业资格的医疗专业人员的当面判断为准。使用本系统不构成医患关系，亦不可替代、推迟或取消任何必要的医疗就诊。";
const DISCLAIMER_2 = "本系统运行于本地消费级硬件，受算力限制，单次评估可能持续数分钟至三十分钟。响应时间不代表评估质量，较长处理时间属正常运行状态。";

// 把 "1.临床印象：… 2.指南符合：… 3.建议：…" 解析为带标签的结构块
function parseSections(text) {
  const t = (cleanInlineMath(text) || "").trim();
  if (!t) return null;
  const re = /(?:^|\n)\s*\d+\s*[\.、]\s*([^：:\n]{2,14})\s*[：:]\s*([\s\S]*?)(?=\n\s*\d+\s*[\.、]\s*[^：:\n]{2,14}\s*[：:]|$)/g;
  const out = []; let m;
  while ((m = re.exec(t)) !== null) out.push({ label: m[1].trim(), body: m[2].trim() });
  return out.length >= 2 ? out : null;
}

// 单条循证推理轨（流程 A 或 B）——并排双盲的一栏
function FlowTrack({ label, sub, report_zh, sources, accent }) {
  const secs = parseSections(report_zh);
  return (
    <div className="rounded-lg p-3.5 transition-colors" style={{ background: "var(--card)", border: "1px solid var(--teal-100)", borderTop: `2px solid ${accent || "var(--teal-500)"}` }}>
      <div className="text-xs font-medium mb-2.5 flex items-center gap-1.5" style={{ color: "var(--teal-700)" }}>
        <span className="inline-block w-2 h-2 rounded-full" style={{ background: accent || "var(--teal-500)" }}></span>
        {label}
        <span className="font-normal" style={{ color: "var(--muted2)" }}>· {sub}</span>
      </div>
      {secs ? (
        <div className="space-y-2.5">
          {secs.map((s, i) => (
            <div key={i}>
              <span className="text-xs px-1.5 py-0.5 rounded mr-1.5 align-middle" style={{ background: "var(--teal-100)", color: "var(--teal-700)", fontWeight: 600 }}>{s.label}</span>
              <span className="text-sm leading-relaxed" style={{ color: "var(--ink)" }}>{s.body}</span>
            </div>
          ))}
        </div>
      ) : (
        <p className="text-sm leading-relaxed whitespace-pre-line" style={{ color: "var(--ink)" }}>{cleanInlineMath(report_zh)}</p>
      )}
      <div className="flex flex-wrap gap-1.5 mt-3 pt-2.5" style={{ borderTop: "1px dashed var(--line)" }}>
        <span className="text-xs" style={{ color: "var(--muted2)" }}>来源</span>
        {[...new Set(sources || [])].map((s, i) => (
          <span key={i} className="text-xs px-2 py-0.5 rounded" style={{ background: "var(--teal-100)", color: "var(--teal-900)" }}>{s}</span>
        ))}
      </div>
    </div>
  );
}

// ── 左栏评估进度（阶段 + 计时；数据由 App 轮询 /progress/assess 传入） ──
function SidebarProgress({ prog }) {
  const [now, setNow] = useState(Date.now());
  const running = !!(prog && prog.running);
  useEffect(() => {
    if (!running) return;
    const id = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(id);
  }, [running]);
  if (!running) return null;
  const stages = prog.stages || [];
  const el = prog.started_at ? Math.max(0, Math.floor(now / 1000 - prog.started_at)) : 0;
  const mm = String(Math.floor(el / 60)).padStart(2, "0"), ss = String(el % 60).padStart(2, "0");
  return (
    <div className="mt-6 pt-4 vh-fade" style={{ borderTop: "1px solid var(--line)" }}>
      <div className="flex items-center justify-between mb-2.5">
        <span className="text-xs font-medium" style={{ color: "var(--teal-700)" }}>双盲评估进行中</span>
        <span className="text-xs tabular-nums" style={{ color: "var(--muted)" }}>{mm}:{ss}</span>
      </div>
      <div className="space-y-1.5">
        {stages.map((s, i) => {
          const done = s.status === "done", act = s.status === "active";
          return (
            <div key={i} className="flex items-start gap-1.5 text-xs" style={{ color: done ? "var(--teal-500)" : act ? "var(--teal-900)" : "var(--muted2)" }}>
              <span className={act ? "animate-pulse" : ""} style={{ width: "1em", textAlign: "center", flexShrink: 0 }}>{done ? "✓" : act ? "◐" : "○"}</span>
              <span style={{ fontWeight: act ? 600 : 400, lineHeight: 1.35 }}>{s.label}</span>
            </div>
          );
        })}
      </div>
      <p className="text-xs mt-3" style={{ color: "var(--muted2)", lineHeight: 1.4 }}>本地模型逐阶段推理，请勿关闭页面——较长耗时属正常。</p>
    </div>
  );
}

// 流式期间某轨尚未产出时的占位卡
function TrackPlaceholder({ label, sub, accent }) {
  return (
    <div className="rounded-lg p-3.5" style={{ background: "var(--card)", border: "1px solid var(--teal-100)", borderTop: `2px solid ${accent}` }}>
      <div className="text-xs font-medium mb-2.5 flex items-center gap-1.5" style={{ color: "var(--teal-700)" }}>
        <span className="inline-block w-2 h-2 rounded-full animate-pulse" style={{ background: accent }}></span>
        {label}<span className="font-normal" style={{ color: "var(--muted2)" }}>· {sub}</span>
      </div>
      <p className="text-sm flex items-center gap-1" style={{ color: "var(--muted)" }}>
        推理中<span className="vh-dot"></span><span className="vh-dot"></span><span className="vh-dot"></span>
      </p>
    </div>
  );
}

// ── 双盲交叉验证评估结果 ──
// result=最终结果；live=流式部分结果(partials)；streaming=是否评估进行中
// 统一渲染：规则先出 → A轨 → B轨 逐段呈现，未出的轨在流式时显占位
function AssessmentResult({ result, live, streaming }) {
  // 归一化字段（最终结果 B 用 report_zh/risk_sources；部分结果用 report_b_zh/sources_b）
  const D = result ? {
    rule_hits: result.rule_hits || [], report_a_zh: result.report_a_zh, sources_a: result.sources_a, a_model: result.a_model,
    report_b_zh: result.report_zh, sources_b: result.risk_sources, b_model: result.b_model, findings_en: result.findings_en,
  } : (live || {});
  const rules = D.rule_hits || [];
  const hasAny = rules.length || D.report_a_zh || D.report_b_zh;
  if (!result && !streaming) return null;
  if (!hasAny && !streaming) return null;
  return (
    <div className="vh-fade mt-5 rounded-xl border p-5" style={{ borderColor: "var(--teal-100)", background: "var(--teal-50)" }}>
      <h3 className="serif text-lg mb-1" style={{ color: "var(--teal-900)" }}>评估报告{!result && streaming ? " · 生成中…" : ""}</h3>
      <p className="text-xs mb-4" style={{ color: "var(--muted2)" }}>背靠背双盲交叉验证 · 两轨独立推理、并排呈现，判断权归人</p>

      {/* 确定性规则命中（双盲共同地基，最先产出） */}
      {rules.length > 0 && (
        <div className="mb-5 vh-fade">
          <div className="text-xs font-medium mb-2 flex items-center gap-1.5" style={{ color: "var(--teal-700)" }}>
            <span className="inline-block w-2 h-2 rounded-full" style={{ background: "var(--teal-500)" }}></span>
            确定性判断 · 规则引擎
          </div>
          <div className="space-y-2">
            {rules.map((h, i) => {
              const sev = SEVERITY[h.severity] || SEVERITY.low;
              return (
                <div key={i} className="rounded-lg p-3 text-sm" style={{ background: "var(--card)", borderLeft: `3px solid ${sev.fg}` }}>
                  <div className="flex items-center justify-between">
                    <span className="font-medium">{h.conclusion}</span>
                    <span className="text-xs px-1.5 py-0.5 rounded shrink-0 ml-2" style={{ background: sev.bg, color: sev.fg }}>{sev.label}</span>
                  </div>
                  <div className="text-xs mt-1" style={{ color: "var(--muted)" }}>{h.metric} = {h.value} · 来源 [{h.citation_id}]</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* 循证解释 · 双盲并排，逐轨流入；未出的轨在流式时显占位 */}
      <div className="grid gap-3 mb-3" style={{ gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))" }}>
        {D.report_a_zh
          ? <div className="vh-fade"><FlowTrack label="流程 A · 循证解释" sub={`国内指南 · ${(D.a_model || "llama3.3").split(":")[0]}`} report_zh={D.report_a_zh} sources={D.sources_a} accent="var(--teal-500)" /></div>
          : (streaming && <TrackPlaceholder label="流程 A · 循证解释" sub="国内指南 · llama3.3" accent="var(--teal-500)" />)}
        {D.report_b_zh
          ? <div className="vh-fade"><FlowTrack label="流程 B · 循证解释" sub={`国际指南 · ${(D.b_model || "llama4").split(":")[0]}`} report_zh={D.report_b_zh} sources={D.sources_b} accent="#6b9bd1" /></div>
          : (streaming && <TrackPlaceholder label="流程 B · 循证解释" sub="国际指南 · llama4" accent="#6b9bd1" />)}
      </div>

      {/* 英文中间结果折叠（仅最终结果有） */}
      {result && result.findings_en && (
        <details className="mt-2 mb-4">
          <summary className="text-xs cursor-pointer" style={{ color: "var(--teal-700)" }}>查看流程 B 英文推理过程（审计溯源）</summary>
          <pre className="text-xs mt-2 p-3 rounded-lg overflow-x-auto whitespace-pre-wrap" style={{ background: "var(--card)", color: "var(--faint)" }}>{result.findings_en}</pre>
        </details>
      )}

      {/* 声明条款（必须醒目展示） */}
      <div className="text-xs leading-relaxed rounded-lg p-3 space-y-1.5" style={{ background: "var(--disc-bg)", border: "1px solid var(--disc-line)", color: "var(--disc-text)" }}>
        <p>⚠ 声明一：{DISCLAIMER_1}</p>
        <p>⚠ 声明二：{DISCLAIMER_2}</p>
      </div>
    </div>
  );
}

// ── 编辑症状包（需求1-4）：文本、文件、上传、清洗 ──
function EditPackageModal({ pkg, allRecords, busy, onSave, onClose, memberId }) {
  if (!pkg) return null;
  const [tab, setTab] = useState("edit");
  const [text, setText] = useState({});
  const [attachedIds, setAttachedIds] = useState(new Set());
  const [uploading, setUploading] = useState(false);
  const [curatedFiles, setCuratedFiles] = useState([]);
  const fileRef = React.useRef(null);

  // 解析症状包文本
  React.useEffect(() => {
    const parsed = {};
    if (pkg?.extracted_zh) {
      for (const line of pkg.extracted_zh.split("\n")) {
        if (line.startsWith("主诉：")) parsed.chief_complaint = line.slice(3).trim();
        else if (line.startsWith("症状：")) parsed.symptoms = line.slice(3).trim();
        else if (line.startsWith("既往史：")) parsed.history = line.slice(4).trim();
        else if (line.startsWith("用药：")) parsed.medications = line.slice(3).trim();
        else if (line.startsWith("家族史：")) parsed.family_history = line.slice(4).trim();
      }
    }
    setText(parsed);
  }, [pkg]);

  const handleUploadFiles = async (files) => {
    setUploading(true);
    setCuratedFiles([]);
    for (const file of files) {
      try {
        const fd = new FormData();
        fd.append("file", file);
        fd.append("member_id", memberId);
        fd.append("record_type", "lab_report");
        fd.append("chief_complaint", text.chief_complaint || "");
        const h = await authHeaders();
        const resp = await fetch(`${API_BASE}/upload-for-curation`, {
          method: "POST",
          headers: h,
          body: fd,
        });
        if (!resp.ok) throw new Error(await resp.text());
        const data = await resp.json();
        setCuratedFiles(prev => [...prev, {
          upload_id: data.upload_id,
          pending_id: data.pending_id,
          file_name: file.name,
          curator_notes: data.curator_notes,
          raw: data.raw_extracted_zh,
          accepted: null,
        }]);
      } catch (e) {
        alert(`上传 ${file.name} 失败：${e.message}`);
      }
    }
    setUploading(false);
  };

  const handleReviewFile = (idx, accepted) => {
    const file = curatedFiles[idx];
    setCuratedFiles(prev => {
      const next = [...prev];
      next[idx] = { ...file, accepted };
      return next;
    });
    if (accepted) {
      setAttachedIds(prev => new Set([...prev, file.upload_id]));
    }
  };

  const handleSave = async () => {
    if (busy) return;
    await onSave({
      package_id: pkg.id,
      edits: text,
      attach_ids: Array.from(attachedIds),
      curated_reviews: curatedFiles.filter(f => f.accepted !== null),
    });
  };

  const otherRecords = allRecords.filter(r => r.record_type !== 'symptom_package');
  const availableRecords = otherRecords.filter(r => !attachedIds.has(r.id));

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 9999 }}>
      <div style={{ background: "var(--card)", borderRadius: "0.75rem", maxWidth: "600px", width: "90%", maxHeight: "80vh", overflow: "auto", padding: "1.5rem" }}>
        <div className="flex items-center justify-between mb-4">
          <h3 className="serif text-lg" style={{ color: "var(--teal-900)" }}>编辑症状包</h3>
          <button onClick={onClose} style={{ fontSize: "1.5rem", background: "none", border: "none", cursor: "pointer" }}>×</button>
        </div>

        {/* 选项卡 */}
        <div className="flex gap-1 mb-4 border-b" style={{ borderColor: "var(--line)" }}>
          {["edit", "attach", "upload"].map(t => (
            <button key={t} onClick={() => setTab(t)}
              style={{
                padding: "0.5rem 1rem",
                borderBottom: tab === t ? "2px solid var(--teal-500)" : "2px solid transparent",
                color: tab === t ? "var(--teal-700)" : "var(--muted)",
                background: "none",
                border: "none",
                cursor: "pointer",
                fontSize: "0.875rem",
                fontWeight: tab === t ? "600" : "400",
              }}>
              {t === "edit" && "编辑文本"}
              {t === "attach" && "关联文件"}
              {t === "upload" && "上传新文件"}
            </button>
          ))}
        </div>

        {/* Tab 1: 编辑文本 */}
        {tab === "edit" && (
          <div className="space-y-3">
            {[
              ["chief_complaint", "主诉"],
              ["symptoms", "症状"],
              ["history", "既往史"],
              ["medications", "用药"],
              ["family_history", "家族史"],
            ].map(([key, label]) => (
              <div key={key}>
                <label className="text-xs block mb-1" style={{ color: "var(--teal-700)" }}>{label}</label>
                <textarea value={text[key] || ""} onChange={e => setText(prev => ({ ...prev, [key]: e.target.value }))}
                  className="w-full text-sm p-2 rounded border" style={{ borderColor: "var(--line)", minHeight: "80px" }}
                  placeholder={`输入${label}…`} />
              </div>
            ))}
          </div>
        )}

        {/* Tab 2: 关联文件 */}
        {tab === "attach" && (
          <div className="grid grid-cols-2 gap-3">
            <div>
              <p className="text-xs font-medium mb-2" style={{ color: "var(--teal-700)" }}>可用文件</p>
              <div className="space-y-1 max-h-64 overflow-y-auto">
                {availableRecords.length === 0 ? (
                  <p className="text-xs" style={{ color: "var(--muted)" }}>暂无可用文件</p>
                ) : (
                  availableRecords.map(r => (
                    <button key={r.id} onClick={() => setAttachedIds(prev => new Set([...prev, r.id]))}
                      className="w-full text-left text-xs p-1.5 rounded border cursor-pointer hover:bg-teal-50"
                      style={{ borderColor: "var(--line)" }}>
                      {RECORD_TYPE_LABEL[r.record_type]} · {r.record_date}
                    </button>
                  ))
                )}
              </div>
            </div>
            <div>
              <p className="text-xs font-medium mb-2" style={{ color: "var(--teal-700)" }}>已关联</p>
              <div className="space-y-1 max-h-64 overflow-y-auto">
                {attachedIds.size === 0 ? (
                  <p className="text-xs" style={{ color: "var(--muted)" }}>未关联任何文件</p>
                ) : (
                  otherRecords.filter(r => attachedIds.has(r.id)).map(r => (
                    <button key={r.id} onClick={() => { const s = new Set(attachedIds); s.delete(r.id); setAttachedIds(s); }}
                      className="w-full text-left text-xs p-1.5 rounded border cursor-pointer hover:bg-red-50"
                      style={{ borderColor: "var(--line)", borderLeftColor: "var(--ochre)" }}>
                      {RECORD_TYPE_LABEL[r.record_type]} · {r.record_date}
                    </button>
                  ))
                )}
              </div>
            </div>
          </div>
        )}

        {/* Tab 3: 上传新文件 */}
        {tab === "upload" && (
          <div className="space-y-3">
            <input ref={fileRef} type="file" multiple accept=".pdf,.jpg,.jpeg,.png" className="hidden"
              onChange={e => { if (e.target.files?.length) handleUploadFiles(Array.from(e.target.files)); }} />
            <button onClick={() => fileRef.current?.click()} disabled={uploading}
              className="w-full text-sm px-3 py-2 rounded-lg border font-medium transition-opacity disabled:opacity-50"
              style={{ borderColor: "var(--teal-500)", color: "var(--teal-900)", background: "var(--teal-50)" }}>
              {uploading ? "上传中…" : "选择文件"}
            </button>
            {curatedFiles.length > 0 && (
              <div className="border-t pt-3" style={{ borderColor: "var(--line)" }}>
                <p className="text-xs font-medium mb-2" style={{ color: "var(--teal-700)" }}>清洗预览（请审核）</p>
                <div className="space-y-2">
                  {curatedFiles.map((f, i) => (
                    <div key={i} className="p-2 rounded border" style={{ borderColor: "var(--line)", background: "var(--paper)" }}>
                      <p className="text-xs font-medium mb-1">{f.file_name}</p>
                      <p className="text-xs mb-2" style={{ color: "var(--faint)" }}>{f.curator_notes}</p>
                      <div className="flex gap-1">
                        <button onClick={() => handleReviewFile(i, true)} disabled={f.accepted !== null}
                          className="text-xs px-2 py-1 rounded transition-opacity disabled:opacity-50"
                          style={{ background: f.accepted === true ? "var(--teal-500)" : "var(--teal-100)", color: f.accepted === true ? "#fff" : "var(--teal-700)" }}>
                          ✓ 接受
                        </button>
                        <button onClick={() => handleReviewFile(i, false)} disabled={f.accepted !== null}
                          className="text-xs px-2 py-1 rounded transition-opacity disabled:opacity-50"
                          style={{ background: f.accepted === false ? "var(--ochre)" : "var(--ochre-bg)", color: f.accepted === false ? "#fff" : "var(--ochre)" }}>
                          × 拒绝
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {/* 保存/取消 */}
        <div className="flex gap-2 mt-6 pt-4 border-t" style={{ borderColor: "var(--line)" }}>
          <button onClick={handleSave} disabled={busy || uploading}
            className="flex-1 px-3 py-2 rounded-lg font-medium transition-opacity disabled:opacity-50"
            style={{ background: "var(--teal-500)", color: "#fff" }}>
            {busy ? "保存中…" : "保存"}
          </button>
          <button onClick={onClose} disabled={busy || uploading}
            className="flex-1 px-3 py-2 rounded-lg font-medium border"
            style={{ borderColor: "var(--line)", color: "var(--ink)", background: "transparent" }}>
            取消
          </button>
        </div>
      </div>
    </div>
  );
}

// ── 选项卡（需求1）：单选即点即发；多选可勾多个，点"确定"再发 ──
// "＋ 更多"：主题不变，向后端要更多选项追加进来（不清空已勾选）
function OptionCards({ q, busy, onSubmit, onMore }) {
  const [sel, setSel] = useState([]);
  if (!q || !q.options || !q.options.length) return null;
  const pill = (on) => ({
    borderColor: "var(--teal-500)",
    color: on ? "#fff" : "var(--teal-900)",
    background: on ? "var(--teal-500)" : "var(--teal-50)",
  });
  const MoreBtn = (
    <button onClick={onMore} disabled={busy}
      className="px-3.5 py-2 rounded-full text-sm border border-dashed transition-colors disabled:opacity-50"
      style={{ borderColor: "var(--teal-500)", color: "var(--teal-700)", background: "transparent" }}>
      ＋ 更多
    </button>
  );
  if (!q.multi) {
    return (
      <div className="flex flex-wrap gap-2 mt-1">
        {q.options.map((opt, i) => (
          <button key={i} onClick={() => onSubmit(opt)} disabled={busy}
            className="px-3.5 py-2 rounded-full text-sm border transition-colors disabled:opacity-50"
            style={pill(false)}>{opt}</button>
        ))}
        {MoreBtn}
      </div>
    );
  }
  const toggle = (o) => setSel(prev => prev.includes(o) ? prev.filter(x => x !== o) : [...prev, o]);
  return (
    <div className="mt-1">
      <div className="text-xs mb-1.5" style={{ color: "var(--muted)" }}>可多选，选好后点"确定"</div>
      <div className="flex flex-wrap gap-2 mb-2">
        {q.options.map((opt, i) => {
          const on = sel.includes(opt);
          return (
            <button key={i} onClick={() => toggle(opt)} disabled={busy}
              className="px-3.5 py-2 rounded-full text-sm border transition-colors disabled:opacity-50"
              style={pill(on)}>{on ? "✓ " : ""}{opt}</button>
          );
        })}
        {MoreBtn}
      </div>
      <button onClick={() => sel.length && onSubmit(sel.join("、"))} disabled={busy || !sel.length}
        className="px-4 py-2 rounded-lg text-sm font-medium disabled:opacity-50"
        style={{ background: "var(--teal-500)", color: "#fff" }}>
        确定{sel.length ? `（已选 ${sel.length}）` : ""}
      </button>
    </div>
  );
}

// ── 主面板（F5 挂号视图 / F6 问诊视图 / 默认档案视图） ──
function MemberDetail({ member, records, onRefreshRecords, editingPackage, savingPackage, onEditPackage, onSavePackage, assessProg }) {
  const [view, setView] = useState("department");   // 默认即进"选择科室"（"profile" | "department" | "interview"）
  const [dept, setDept] = useState(null);
  const [messages, setMessages] = useState([]);   // 仅聊天气泡 {role, text}
  const [pending, setPending] = useState(null);   // 当前待作答问题 {question,options,multi,allow_free_text}
  const [done, setDone] = useState(false);        // 问诊是否结束
  const [inputText, setInputText] = useState("");
  const [busy, setBusy] = useState(false);
  const [assessingId, setAssessingId] = useState(null);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [selPkgId, setSelPkgId] = useState(null);   // 当前选中的症状包

  function startInterview() { setView("department"); setError(null); }

  useEffect(() => {
    setView("department"); setDept(null); setMessages([]); setPending(null); setDone(false);
    setInputText(""); setResult(null); setError(null); setSelPkgId(null);
  }, [member.id]);

  async function chooseDept(deptKey) {
    setBusy(true); setError(null); setDone(false); setPending(null);
    setDept(deptKey);
    // 需求3：先进对话界面，首条 AI 消息即过渡说明（加载期间先呈现给用户）
    setMessages([{ role: "ai", text: INTRO_TEXT }]);
    setView("interview");
    try {
      const h = await authHeaders();
      const resp = await fetch(`${API_BASE}/interview/start`, {
        method: "POST",
        headers: { "Content-Type": "application/json", ...h },
        body: JSON.stringify({ department: deptKey, member_id: member.id }),
      });
      if (!resp.ok) throw new Error(`挂号失败：${resp.status}`);
      const data = await resp.json();
      setMessages(prev => [...prev, { role: "ai", text: data.question || "请描述您的情况。" }]);
      setPending({ question: data.question || "", options: data.options || [],
                   multi: !!data.multi, allow_free_text: data.allow_free_text !== false });
    } catch (e) {
      setMessages(prev => [...prev, { role: "ai", text: `挂号失败：${e.message}` }]);
    } finally {
      setBusy(false);
    }
  }

  // 作答（自由输入或点选项卡均走此）—— 会消费当前待选问题，推进问诊
  async function sendMessage(forced) {
    const text = (forced !== undefined ? forced : inputText).trim();
    if (!text || busy) return;
    if (forced === undefined) setInputText("");
    setMessages(prev => [...prev, { role: "user", text }]);
    setPending(null);                 // 已作答，清掉待选
    setBusy(true);
    try {
      const h = await authHeaders();
      const resp = await fetch(`${API_BASE}/interview/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json", ...h },
        body: JSON.stringify({ message: text }),
      });
      if (!resp.ok) throw new Error(`通信失败：${resp.status}`);
      const data = await resp.json();
      if (data.done) {
        setMessages(prev => [...prev, { role: "ai",
          text: "问诊已完成，症状数据包已打时间戳归档为新病史。" }]);
        setDone(true);
        if (onRefreshRecords) onRefreshRecords();   // 需求4：新档案即时显现
      } else {
        setMessages(prev => [...prev, { role: "ai", text: data.question }]);
        setPending({ question: data.question || "", options: data.options || [],
                     multi: !!data.multi, allow_free_text: data.allow_free_text !== false });
      }
    } catch (e) {
      setMessages(prev => [...prev, { role: "ai", text: `错误：${e.message}` }]);
    } finally {
      setBusy(false);
    }
  }

  // "更多"：为当前问题追加更多选项（主题不变、不清空已勾选、不推进问诊）
  async function requestMore() {
    if (busy || !pending) return;
    setBusy(true);
    try {
      const h = await authHeaders();
      const resp = await fetch(`${API_BASE}/interview/more`, { method: "POST", headers: h });
      if (!resp.ok) throw new Error(`获取更多失败：${resp.status}`);
      const data = await resp.json();
      if (data.options && data.options.length) {
        setPending(prev => prev ? { ...prev, options: [...prev.options, ...data.options] } : prev);
      } else {
        setMessages(prev => [...prev, { role: "ai", text: "暂时没有更多选项了，您可在下方直接输入补充。" }]);
      }
    } catch (e) {
      setMessages(prev => [...prev, { role: "ai", text: `获取更多选项出错：${e.message}` }]);
    } finally {
      setBusy(false);
    }
  }

  // 需求2：上传报告（可多文件）→ 后端存 MinIO + glm-ocr 建档
  // 需求4：上传不触碰 pending，待选问题原样保留，不被打断
  async function uploadReports(fileList, recordType) {
    const files = fileList ? Array.from(fileList) : [];
    if (!files.length || busy) return;
    setError(null); setBusy(true);
    try {
      for (const f of files) {
        setMessages(prev => [...prev, { role: "user", text: `📎 上传报告：${f.name}` }]);
        try {
          const fd = new FormData();
          fd.append("file", f);
          fd.append("member_id", member.id);
          fd.append("record_type", recordType || "lab_report");
          const h = await authHeaders();   // 不手动设 Content-Type，交浏览器补 multipart 边界
          const resp = await fetch(`${API_BASE}/upload`, { method: "POST", headers: h, body: fd });
          if (!resp.ok) {
            const d = await resp.json().catch(() => ({}));
            throw new Error(d.detail || `上传失败：${resp.status}`);
          }
          const data = await resp.json();
          const ocrNote = data.extracted_zh
            ? `已识别文字：\n${data.extracted_zh.slice(0, 200)}${data.extracted_zh.length > 200 ? "…" : ""}`
            : (data.ocr_error ? `（OCR 未成功：${data.ocr_error}，原件已保存，可后续手动补录）` : "（未识别到文字）");
          setMessages(prev => [...prev, { role: "ai",
            text: `报告已归档（${RECORD_TYPE_LABEL[data.record_type] || data.record_type}）。${ocrNote}` }]);
        } catch (e) {
          setMessages(prev => [...prev, { role: "ai", text: `「${f.name}」上传出错：${e.message}` }]);
        }
      }
      if (onRefreshRecords) onRefreshRecords();
    } finally {
      setBusy(false);   // pending 全程未动，待选问题仍在
    }
  }

  async function handleAssess(rec) {
    setAssessingId(rec.id); setError(null); setResult(null);
    try {
      const r = await apiAssess(member.id, rec.id, rec.extracted_zh);
      setResult(r);
    } catch (e) {
      setError(e.message);
    } finally {
      setAssessingId(null);
    }
  }

  const deptInfo = DEPARTMENTS.find(d => d.key === dept);

  // ── F5：科室选择视图 ──
  if (view === "department") return (
    <main className="flex-1 p-8 max-w-3xl">
      <div className="flex items-center gap-3 mb-8">
        <button onClick={() => setView("profile")} className="text-sm" style={{ color: "var(--teal-700)" }}>← 返回</button>
        <h2 className="serif text-2xl" style={{ color: "var(--teal-900)" }}>选择科室</h2>
      </div>
      {error && (
        <div className="mb-4 rounded-lg p-3 text-sm" style={{ background: "var(--ochre-bg)", color: "var(--ochre)" }}>{error}</div>
      )}
      <div className="grid grid-cols-2 gap-4">
        {DEPARTMENTS.map(d => (
          <button key={d.key} onClick={() => chooseDept(d.key)} disabled={busy}
            className="vh-lift rounded-xl border p-6 text-left disabled:opacity-50"
            style={{ borderColor: "var(--line)", background: "var(--card)" }}>
            <div className="text-3xl mb-3">{d.icon}</div>
            <div className="font-medium text-base mb-1" style={{ color: "var(--teal-900)" }}>{d.label}</div>
            <div className="text-xs" style={{ color: "var(--muted)" }}>{d.desc}</div>
          </button>
        ))}
      </div>
    </main>
  );

  // ── F6：问诊对话视图（左=对话/选项卡/上传，右=病史侧栏） ──
  const allowFreeText = !pending || pending.allow_free_text !== false;
  if (view === "interview") return (
    <main className="flex-1 flex" style={{ height: "100vh" }}>
      {/* 左：对话列 */}
      <div className="flex-1 flex flex-col min-w-0">
        <div className="flex items-center gap-3 px-8 py-4 border-b shrink-0"
             style={{ borderColor: "var(--line)", background: "var(--card)" }}>
          <button onClick={() => setView("department")} className="text-sm" style={{ color: "var(--teal-700)" }}>← 返回</button>
          <span className="text-sm font-medium" style={{ color: "var(--teal-900)" }}>
            {deptInfo ? `${deptInfo.icon} ${deptInfo.label}` : "问诊"} · {member.full_name}
          </span>
        </div>
        <div className="flex-1 overflow-y-auto px-8 py-6 flex flex-col gap-3">
          {messages.map((m, i) => (
            <div key={i} className={`flex vh-fade ${m.role === "user" ? "justify-end" : "justify-start"}`}>
              <div className="max-w-md rounded-2xl px-4 py-3 text-sm leading-relaxed whitespace-pre-line"
                style={{
                  background: m.role === "user" ? "var(--teal-500)" : "var(--card)",
                  color: m.role === "user" ? "#fff" : "var(--ink)",
                  border: m.role === "ai" ? "1px solid var(--line)" : "none",
                }}>
                {m.text}
              </div>
            </div>
          ))}
          {busy && (
            <div className="flex justify-start vh-fade">
              <div className="rounded-2xl px-4 py-3 text-sm flex items-center gap-2" style={{ background: "var(--card)", border: "1px solid var(--line)", color: "var(--muted)" }}>
                <span>主治医生正在思考</span>
                <span className="vh-dot"></span><span className="vh-dot"></span><span className="vh-dot"></span>
              </div>
            </div>
          )}
          {/* 需求1：选项卡（单/多选）。由 pending 驱动，上传不会清掉它（需求4） */}
          {!done && pending && (
            <OptionCards key={pending.question} q={pending} busy={busy}
              onSubmit={(t) => sendMessage(t)} onMore={requestMore} />
          )}
          {done && (
            <div className="text-center mt-4">
              <p className="text-sm mb-3" style={{ color: "var(--teal-700)" }}>问诊完成 · 症状包已归档</p>
              <button onClick={() => setView("profile")}
                className="text-sm px-4 py-2 rounded-lg font-medium"
                style={{ background: "var(--teal-500)", color: "#fff" }}>返回档案</button>
            </div>
          )}
        </div>
        {!done && (
          <div className="shrink-0 px-8 py-4 border-t flex flex-col gap-3"
               style={{ borderColor: "var(--line)", background: "var(--card)" }}>
            {/* 需求2：上传报告（可多选文件） */}
            <UploadBar busy={busy} onUpload={uploadReports} />
            {/* 自由输入兜底 */}
            <div className="flex gap-3">
              <input type="text" value={inputText}
                onChange={e => setInputText(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } }}
                placeholder={allowFreeText ? "描述症状或回答医生问题…" : "可点击上方选项，或在此补充…"}
                className="flex-1 rounded-lg px-3 py-2 text-sm border"
                style={{ borderColor: "var(--line)", color: "var(--ink)", background: "var(--paper)" }}
                disabled={busy} />
              <button onClick={() => sendMessage()} disabled={busy || !inputText.trim()}
                className="px-4 py-2 rounded-lg text-sm font-medium disabled:opacity-50"
                style={{ background: "var(--teal-500)", color: "#fff" }}>发送</button>
            </div>
          </div>
        )}
      </div>
      {/* 右：需求3 — 该患者相关病史 */}
      <aside className="w-72 shrink-0 border-l overflow-y-auto p-5"
             style={{ borderColor: "var(--line)", background: "var(--card)" }}>
        <h3 className="text-sm font-medium mb-1" style={{ color: "var(--teal-900)" }}>相关病史</h3>
        <p className="text-xs mb-4" style={{ color: "var(--muted2)" }}>{member.full_name} · 共 {records.length} 条</p>
        {records.length === 0 ? (
          <p className="text-xs" style={{ color: "var(--muted2)" }}>暂无历史记录</p>
        ) : (
          <div className="space-y-2.5">
            {records.map(rec => (
              <div key={rec.id} className="vh-lift rounded-lg border p-2.5" style={{ borderColor: "var(--line)" }}>
                <div className="flex items-center justify-between mb-1">
                  <span className="text-xs px-1.5 py-0.5 rounded" style={{ background: "var(--teal-50)", color: "var(--teal-700)" }}>
                    {RECORD_TYPE_LABEL[rec.record_type] || rec.record_type}
                  </span>
                  <span className="text-xs" style={{ color: "var(--muted2)" }}>{rec.record_date}</span>
                </div>
                <p className="text-xs leading-relaxed" style={{ color: "var(--ink)" }}>
                  {(rec.extracted_zh || "").slice(0, 90)}{(rec.extracted_zh || "").length > 90 ? "…" : ""}
                </p>
              </div>
            ))}
          </div>
        )}
      </aside>
    </main>
  );

  // ── 档案视图（默认） ──
  return (
    <main className="flex-1 p-8 max-w-3xl">
      <div className="flex items-baseline justify-between mb-1">
        <div className="flex items-baseline gap-3">
          <h2 className="serif text-2xl" style={{ color: "var(--teal-900)" }}>{member.full_name}</h2>
          <span className="text-sm" style={{ color: "var(--muted)" }}>{member.relation} · {age(member.birth_date)}</span>
        </div>
        <button onClick={startInterview}
          className="text-sm px-4 py-1.5 rounded-lg font-medium"
          style={{ background: "var(--teal-100)", color: "var(--teal-900)" }}>
          + 开始问诊
        </button>
      </div>
      {(() => {
        const pkgs = records.filter(r => r.record_type === "symptom_package");
        const selPkg = pkgs.find(p => p.id === selPkgId) || pkgs[0] || null;
        const others = records.length - pkgs.length;
        if (pkgs.length === 0) {
          return (
            <div className="rounded-xl border border-dashed p-10 text-center" style={{ borderColor: "var(--line)" }}>
              <p className="text-sm" style={{ color: "var(--muted)" }}>暂无症状包</p>
              <p className="text-xs mt-1" style={{ color: "var(--muted2)" }}>点右上「开始问诊」生成一次症状包后即可运行双盲评估</p>
            </div>
          );
        }
        return (
          <div>
            {/* 症状包下拉选择 */}
            <div className="flex items-center gap-2 mb-3">
              <span className="text-sm shrink-0" style={{ color: "var(--muted)" }}>症状包</span>
              <select value={selPkg ? selPkg.id : ""} onChange={e => setSelPkgId(e.target.value)}
                className="flex-1 rounded-lg px-3 py-2 text-sm border"
                style={{ borderColor: "var(--line)", color: "var(--ink)", background: "var(--paper)" }}>
                {pkgs.map(p => (
                  <option key={p.id} value={p.id}>
                    {(p.record_date || "—")} · {(p.extracted_zh || "").replace(/\s+/g, " ").slice(0, 28)}…
                  </option>
                ))}
              </select>
            </div>
            {/* 当前症状包详情 */}
            {selPkg && (
              <div className="rounded-xl border p-4 mb-4" style={{ borderColor: "var(--line)", background: "var(--card)" }}>
                <div className="flex items-center justify-between mb-2">
                  <span className="text-xs px-2 py-0.5 rounded" style={{ background: "var(--teal-50)", color: "var(--teal-700)" }}>问诊症状包 · {selPkg.record_date}</span>
                  <div className="flex gap-2">
                    <button onClick={() => onEditPackage(selPkg)} disabled={!!assessingId}
                      className="text-xs px-3 py-1.5 rounded-lg font-medium disabled:opacity-50"
                      style={{ background: "var(--teal-100)", color: "var(--teal-900)" }}>编辑</button>
                    <button onClick={() => handleAssess(selPkg)} disabled={!!assessingId}
                      className="text-xs px-3 py-1.5 rounded-lg font-medium disabled:opacity-50"
                      style={{ background: "var(--teal-500)", color: "#fff" }}>
                      {assessingId === selPkg.id ? "评估中…" : "运行双盲评估"}</button>
                  </div>
                </div>
                <p className="text-sm leading-relaxed whitespace-pre-line" style={{ color: "var(--ink)" }}>{selPkg.extracted_zh}</p>
                {others > 0 && <p className="text-xs mt-3 pt-2" style={{ color: "var(--muted2)", borderTop: "1px dashed var(--line)" }}>另有 {others} 条在档报告，评估时自动并入佐证</p>}
              </div>
            )}
          </div>
        );
      })()}

      {error && (
        <div className="mt-5 rounded-lg p-4 text-sm" style={{ background: "var(--ochre-bg)", color: "var(--ochre)" }}>
          评估未能完成：{error}。请确认编排服务正在运行。
        </div>
      )}

      {/* 评估结论：逐段流式（规则→A→B），完成后切最终结果 */}
      <AssessmentResult result={result}
        live={assessProg && assessProg.partials}
        streaming={!!assessingId && !!(assessProg && assessProg.running)} />

      {editingPackage && (
        <EditPackageModal
          pkg={editingPackage}
          allRecords={records}
          busy={savingPackage}
          onSave={onSavePackage}
          onClose={() => onEditPackage(null)}
          memberId={member.id}
        />
      )}

      <p className="text-xs mt-8 pt-4 border-t" style={{ borderColor: "var(--line)", color: "var(--muted2)" }}>
        本系统为私人健康记录与评估辅助工具，输出不构成医疗诊断，不替代专业医疗。
      </p>
    </main>
  );
}

function LoginGate() {
  return (
    <div className="flex min-h-screen items-center justify-center">
      <div className="text-center">
        <h1 className="serif text-2xl mb-2" style={{ color: "var(--teal-900)" }}>家族健康档案</h1>
        <p className="text-sm mb-6" style={{ color: "var(--muted)" }}>本地私有 · 数据不出家门</p>
        <button onClick={login} className="px-5 py-2.5 rounded-lg font-medium text-sm"
          style={{ background: "var(--teal-500)", color: "#fff" }}>登录</button>
      </div>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [oidcReady, setOidcReady] = useState(USE_MOCK);
  const [members, setMembers] = useState(USE_MOCK ? MOCK_MEMBERS : []);
  const [recordsMap, setRecordsMap] = useState(USE_MOCK ? MOCK_RECORDS : {});
  const [activeId, setActiveId] = useState(USE_MOCK ? MOCK_MEMBERS[0].id : null);
  const [loadErr, setLoadErr] = useState(null);
  const [loading, setLoading] = useState(false);
  const [editingPackage, setEditingPackage] = useState(null);
  const [savingPackage, setSavingPackage] = useState(false);
  const [assessProg, setAssessProg] = useState(null);   // 评估进度+流式部分结果（轮询 /progress/assess）

  // 轮询评估进度（左栏阶段 + 中间流式结论共用此数据源）
  useEffect(() => {
    if (USE_MOCK) return;
    let stop = false;
    const poll = async () => {
      try { const r = await fetch(`${API_BASE}/progress/assess`); if (r.ok && !stop) setAssessProg(await r.json()); } catch (e) {}
    };
    poll();
    const id = setInterval(poll, 2500);
    return () => { stop = true; clearInterval(id); };
  }, []);

  // OIDC 初始化：处理登录回调或恢复已有会话
  useEffect(() => {
    if (USE_MOCK) return;
    (async () => {
      try {
        const url = new URL(window.location.href);
        if (url.searchParams.has("code") && url.searchParams.has("state")) {
          // 授权码回调 — 交换 code 取 token
          const u = await _UM.signinRedirectCallback();
          window.history.replaceState({}, "", "http://localhost:5500/");
          setUser(u);
        } else {
          // 检查 oidc-client-ts 本地缓存的有效 session
          const u = await _UM.getUser();
          if (u && !u.expired) setUser(u);
        }
      } catch (e) {
        console.error("OIDC init error:", e);
      } finally {
        setOidcReady(true);
      }
    })();
  }, []);

  // 登录后拉成员列表
  useEffect(() => {
    if (USE_MOCK || !user) return;
    setLoading(true);
    authHeaders().then(h => fetch(`${API_BASE}/members`, { headers: h }))
      .then(async r => {
        if (r.status === 401) { _UM.signinRedirect(); return; }
        if (!r.ok) {
          const d = await r.json().catch(() => ({}));
          throw new Error(d.detail || `加载成员失败 ${r.status}`);
        }
        return r.json();
      })
      .then(data => {
        if (!data) return;
        setMembers(data);
        if (data.length) setActiveId(data[0].id);
      })
      .catch(e => setLoadErr(e.message))
      .finally(() => setLoading(false));
  }, [user]);

  // 拉取（或强制刷新）某成员的记录
  const fetchRecords = React.useCallback(async (memberId) => {
    if (USE_MOCK || !memberId) return;
    try {
      const h = await authHeaders();
      const r = await fetch(`${API_BASE}/members/${memberId}/records`, { headers: h });
      const data = r.ok ? await r.json() : [];
      setRecordsMap(prev => ({ ...prev, [memberId]: data }));
    } catch {
      setRecordsMap(prev => ({ ...prev, [memberId]: [] }));
    }
  }, []);

  // 切换成员时按需拉记录（已缓存则跳过）
  useEffect(() => {
    if (USE_MOCK || !activeId || recordsMap[activeId] !== undefined) return;
    fetchRecords(activeId);
  }, [activeId]);

  // 编辑症状包
  const handleEditPackage = (pkg) => {
    setEditingPackage(pkg);
  };

  // 保存症状包编辑
  const handleSavePackage = async (changes) => {
    setSavingPackage(true);
    try {
      const h = await authHeaders();

      // 1. 编辑文本
      if (Object.keys(changes.edits).length > 0) {
        const resp = await fetch(`${API_BASE}/symptom-packages/${changes.package_id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json", ...h },
          body: JSON.stringify(changes.edits),
        });
        if (!resp.ok) throw new Error(`保存失败：${resp.status}`);
      }

      // 2. 管理关联文件
      if (changes.attach_ids.length > 0) {
        const resp = await fetch(`${API_BASE}/symptom-packages/${changes.package_id}/evidence`, {
          method: "POST",
          headers: { "Content-Type": "application/json", ...h },
          body: JSON.stringify({ evidence_ids: changes.attach_ids, action: "add" }),
        });
        if (!resp.ok) throw new Error(`关联文件失败：${resp.status}`);
      }

      // 3. 审核上传的文件
      for (const review of changes.curated_reviews) {
        const resp = await fetch(`${API_BASE}/curation-review/${review.upload_id}`, {
          method: "POST",
          headers: { "Content-Type": "application/json", ...h },
          body: JSON.stringify({
            accepted: review.accepted,
            package_id: changes.package_id,
            curator_notes: review.curator_notes || "",
          }),
        });
        if (!resp.ok) throw new Error(`审核失败：${resp.status}`);
      }

      // 刷新记录
      await fetchRecords(activeId);
      setEditingPackage(null);
    } catch (e) {
      alert(`保存失败：${e.message}`);
    } finally {
      setSavingPackage(false);
    }
  };

  if (!oidcReady) return (
    <div className="flex min-h-screen items-center justify-center">
      <p style={{ color: "var(--teal-700)" }}>正在初始化…</p>
    </div>
  );

  if (!USE_MOCK && !user) return <LoginGate />;

  if (loading) return (
    <div className="flex min-h-screen items-center justify-center">
      <p style={{ color: "var(--teal-700)" }}>正在连接后端…</p>
    </div>
  );

  const active = members.find(m => m.id === activeId) || null;
  const records = (USE_MOCK ? MOCK_RECORDS[activeId] : recordsMap[activeId]) || [];

  return (
    <div className="flex min-h-screen">
      <MemberSidebar members={members} activeId={activeId} onSelect={setActiveId} assessProg={assessProg} />
      <div className="flex-1">
        {loadErr && (
          <div className="m-6 p-4 rounded-lg text-sm" style={{ background: "var(--ochre-bg)", color: "var(--ochre)" }}>
            {loadErr}
          </div>
        )}
        {active && <MemberDetail member={active} records={records}
                                 onRefreshRecords={() => fetchRecords(activeId)}
                                 editingPackage={editingPackage}
                                 savingPackage={savingPackage}
                                 onEditPackage={handleEditPackage}
                                 onSavePackage={handleSavePackage}
                                 assessProg={assessProg} />}
        {!active && !loadErr && (
          <div className="flex items-center justify-center h-full text-sm" style={{ color: "var(--muted)" }}>
            {members.length === 0 ? "暂无成员记录" : "请从左侧选择成员"}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
