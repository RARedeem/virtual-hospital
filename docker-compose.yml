services:
  # ────────────────────────────────────────────────────────
  # Ollama — 本地模型推理引擎（双卡）
  # 约束 A 合规模型：gemma4(谷歌) / meditron(EPFL) / nomic-embed(美) / llama3.3(Meta，流程A)
  # 约束 A 例外：bge-m3(北京智源) 仅限流程 A 国内指南检索，见 orchestrator 注释 / ARCHITECTURE §2
  # ────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: vh-ollama
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: unless-stopped
    runtime: nvidia              # 触发 nvidia-container-runtime 注入驱动库（仅设备节点不够）
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=0          # 用完立即释放显存，多模型串行管道必需
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_NUM_PARALLEL=1
      # 代理隔离：本机走 7890 代理，但本栈"数据不出家门"，容器内部调用必须直连、绝不经代理。
      - NO_PROXY=localhost,127.0.0.1,::1,ollama,postgres,minio,authentik-server,authentik-worker,authentik-redis
      - no_proxy=localhost,127.0.0.1,::1,ollama,postgres,minio,authentik-server,authentik-worker,authentik-redis
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all          # 双卡全部交给 Ollama 调度
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ────────────────────────────────────────────────────────
  # PostgreSQL 16 + pgvector — 健康档案 + 规则库 + 向量索引
  # ────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vh-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_USER=${PG_USER:-yangrenming}
      - POSTGRES_PASSWORD=${PG_PASSWORD:?must set PG_PASSWORD in .env}
      - POSTGRES_DB=${PG_DB:-virtual_hospital}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro   # 启动时自动建表
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-yangrenming} -d ${PG_DB:-virtual_hospital}"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────────
  # MinIO — 原始 PDF / 检验报告 / 影像文件对象存储
  # ────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: vh-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_USER:-vhminio}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD:?must set MINIO_PASSWORD in .env}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ────────────────────────────────────────────────────────
  # Orchestrator — FastAPI 编排服务，实现翻译三明治管道
  # ────────────────────────────────────────────────────────
  orchestrator:
    build: ./orchestrator
    container_name: vh-orchestrator
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - PG_DSN=postgresql://${PG_USER:-yangrenming}:${PG_PASSWORD}@postgres:5432/${PG_DB:-virtual_hospital}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_USER=${MINIO_USER:-vhminio}
      - MINIO_PASSWORD=${MINIO_PASSWORD}
      # ★ 流程 B 推理路线（2026-06-24 经三臂评测 + 架构师裁定，由旧 meditron 改版）：
      #   gemma4 汉译英(translator-zh-en) → nomic 检索国际指南 → llama4:16x17b 循证推理 → gemma4 英译汉(translator-en-zh)。
      #   退役 meditron(评测证其幻觉/过诊/抄few-shot)；reasoner 换 llama4(质量略胜 llama3.3、与 A2 异质→真双盲)。
      #   翻译【仍用定制 gemma4 翻译器】：全链路实测 llama3.3 翻译会吐繁体+"Here is the translation:"前缀，
      #     定制 gemma4(简体调校、守纪律)更可靠——单句对照看着等价，真管道里才露馅。
      #   keep_alive 仍 0：多大模型无法共驻，守显存纪律防累积 OOM；B 批处理延迟可容忍。
      #   依据见记忆 reasoner-meditron-vs-llama / rigid-pipeline-route。
      - MODEL_TRANSLATE=translator-zh-en
      - MODEL_TRANSLATE_BACK=translator-en-zh
      - MODEL_REASONING=llama4:16x17b
      - MODEL_EMBED=nomic-embed-text:v1.5
      # 流程 A2（双盲另一轨）：约束 A 例外——bge-m3(北京智源)仅限流程 A 国内指南检索（见 ARCHITECTURE §2）。
      #   A1 问诊(交互) 与 A2 推理 均 llama3.3:70b。
      - MODEL_A2_REASONING=llama3.3:70b
      - MODEL_EMBED_CN=bge-m3
      # 代理隔离：内部调用(ollama/postgres/minio/authentik)必须直连，绝不经本机 7890 代理
      - NO_PROXY=localhost,127.0.0.1,::1,ollama,postgres,minio,authentik-server,authentik-worker,authentik-redis
      - no_proxy=localhost,127.0.0.1,::1,ollama,postgres,minio,authentik-server,authentik-worker,authentik-redis
      - OIDC_ISSUER=${OIDC_ISSUER:-http://authentik-server:9000/application/o/virtual-hospital/}
      - OIDC_JWKS_URL=${OIDC_JWKS_URL:-http://authentik-server:9000/application/o/virtual-hospital/jwks/}
      - OIDC_AUDIENCE=${OIDC_AUDIENCE:-virtual-hospital}
      - DEV_BYPASS_AUTH=${DEV_BYPASS_AUTH:-}
    volumes:
      - ./terminology:/app/terminology:ro   # 中英医学术语对照表
      - ./config:/config:ro                 # 统一设置（外挂数据集），见 config/；与 ingestion/lab 同源
    depends_on:
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ────────────────────────────────────────────────────────
  # Ingestion — 指南摄取任务（按需执行，非常驻）
  # 用法：docker compose run --rm ingestion ingest --pdf ... --org ...
  # profiles 使其不随 `docker compose up` 自动启动
  # ────────────────────────────────────────────────────────
  ingestion:
    build: ./ingestion
    container_name: vh-ingestion
    profiles: ["tools"]
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - PG_DSN=postgresql://${PG_USER:-yangrenming}:${PG_PASSWORD}@postgres:5432/${PG_DB:-virtual_hospital}
      - MODEL_EMBED=nomic-embed-text:v1.5
      - MODEL_EMBED_CN=bge-m3        # 国内指南 scope=domestic 用（约束 A 例外，仅流程 A）
      - HF_ENDPOINT=https://hf-mirror.com
      # 代理隔离：ollama/postgres 内部调用直连；hf-mirror 等外网不在表内，仍按需直连(dns 已配)
      - NO_PROXY=localhost,127.0.0.1,::1,ollama,postgres,minio
      - no_proxy=localhost,127.0.0.1,::1,ollama,postgres,minio
    volumes:
      - ./guidelines:/data:ro          # 将待摄取 PDF 放入 ./guidelines
      - ./config:/config:ro            # 跨服务统一设置（scope/约束B），见 config/
    depends_on:
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ────────────────────────────────────────────────────────
  # Authentik — OIDC 身份提供方（认证层）
  # 授权逻辑在 orchestrator，此处仅负责"你是谁"
  # ────────────────────────────────────────────────────────
  authentik-redis:
    image: redis:7-alpine
    container_name: vh-authentik-redis
    restart: unless-stopped
    command: --save 60 1 --loglevel warning
    volumes:
      - authentik-redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 30s
      timeout: 5s
      retries: 5

  authentik-server:
    image: ghcr.io/goauthentik/server:2024.10
    container_name: vh-authentik-server
    restart: unless-stopped
    command: server
    environment:
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY:?must set in .env}
      - AUTHENTIK_REDIS__HOST=authentik-redis
      - AUTHENTIK_POSTGRESQL__HOST=postgres
      - AUTHENTIK_POSTGRESQL__USER=${PG_USER:-yangrenming}
      - AUTHENTIK_POSTGRESQL__PASSWORD=${PG_PASSWORD}
      - AUTHENTIK_POSTGRESQL__NAME=${AUTHENTIK_DB:-authentik}
    ports:
      - "127.0.0.1:9100:9000"   # 9000 already used by MinIO; Authentik binds 9100 on host
    depends_on:
      postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy

  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.10
    container_name: vh-authentik-worker
    restart: unless-stopped
    command: worker
    environment:
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY:?must set in .env}
      - AUTHENTIK_REDIS__HOST=authentik-redis
      - AUTHENTIK_POSTGRESQL__HOST=postgres
      - AUTHENTIK_POSTGRESQL__USER=${PG_USER:-yangrenming}
      - AUTHENTIK_POSTGRESQL__PASSWORD=${PG_PASSWORD}
      - AUTHENTIK_POSTGRESQL__NAME=${AUTHENTIK_DB:-authentik}
    depends_on:
      postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy

volumes:
  ollama-models:
  pg-data:
  minio-data:
  authentik-redis:
